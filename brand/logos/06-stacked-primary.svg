<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 225" width="360" height="225">
  <title>Valley Joint Pain Center — stacked lockup</title>
  <desc>Vertical lockup with the mark above the wordmark, for square or portrait-oriented contexts.</desc>

  <!-- Mark -->
  <g transform="translate(180, 75)">
    <path d="M -5 -28 Q -28 -28 -28 -5 L -28 5 Q -28 28 -5 28" stroke="#0a3d42" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 5 -28 Q 28 -28 28 -5 L 28 5 Q 28 28 5 28" stroke="#0a3d42" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="4.5" fill="#c8780a"/>
  </g>

  <!-- Wordmark -->
  <text x="180" y="160" text-anchor="middle" font-family="Lora, Georgia, serif" font-weight="500" font-size="32" fill="#0a3d42">Valley</text>
  <text x="180" y="195" text-anchor="middle" font-family="Lora, Georgia, serif" font-weight="400" font-style="italic" font-size="32" fill="#0d5c63">Joint Pain</text>

</svg>
