<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 155" width="600" height="155">
  <title>Valley Joint Pain Center — horizontal lockup</title>
  <desc>The primary brand lockup: hinge mark next to the Valley Joint Pain wordmark.</desc>

  <!-- Mark -->
  <g transform="translate(70, 90)">
    <path d="M -5 -28 Q -28 -28 -28 -5 L -28 5 Q -28 28 -5 28" stroke="#0a3d42" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 5 -28 Q 28 -28 28 -5 L 28 5 Q 28 28 5 28" stroke="#0a3d42" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="4.5" fill="#c8780a"/>
  </g>

  <!-- Divider -->
  <line x1="125" y1="55" x2="125" y2="125" stroke="#d8d3c7" stroke-width="0.5"/>

  <!-- Wordmark -->
  <text x="150" y="82" font-family="Lora, Georgia, serif" font-weight="500" font-size="30" fill="#0a3d42">Valley</text>
  <text x="150" y="115" font-family="Lora, Georgia, serif" font-weight="400" font-style="italic" font-size="30" fill="#0d5c63">Joint Pain</text>

</svg>
