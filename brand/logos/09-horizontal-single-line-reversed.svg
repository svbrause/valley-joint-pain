<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 110" width="460" height="110">
  <title>Valley Joint Pain Center — horizontal single-line lockup, reversed</title>
  <desc>Compact single-line lockup on the deep teal brand background. For footers, dark email signatures, and dark-background contexts.</desc>

  <rect width="460" height="110" fill="#0a3d42"/>

  <!-- Mark -->
  <g transform="translate(55, 55)">
    <path d="M -5 -28 Q -28 -28 -28 -5 L -28 5 Q -28 28 -5 28" stroke="#faf8f3" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 5 -28 Q 28 -28 28 -5 L 28 5 Q 28 28 5 28" stroke="#faf8f3" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="4.5" fill="#e8a043"/>
  </g>

  <!-- Divider -->
  <line x1="108" y1="20" x2="108" y2="90" stroke="rgba(250,248,243,0.25)" stroke-width="0.5"/>

  <!-- Wordmark — single line -->
  <text x="128" y="66" font-family="Lora, Georgia, serif" font-size="32" fill="#faf8f3">
    <tspan font-weight="500">Valley </tspan><tspan font-weight="400" font-style="italic" fill="#e8a043">Joint Pain</tspan>
  </text>

</svg>
